#pdf-render-area{position:fixed;left:-9999px;top:0;width:780px;z-index:-1}

        <div style="font-size:11px;opacity:.7;margin-top:4px">1. Delete .json file<br>2. Recreate on next run<br>3. Automatic recovery</div>
      </div>
    </div>
    <div class="code-block" style="margin-top:10px;font-size:9.5px">etl.cleanup_old_locks(older_than_hours=24)
etl.get_registry_status()['active_locks']</div>
  </div>` },

  { bg:'slide-blue', render:`<div>
    <div class="tag">Best practices</div>
    <h2>Production patterns</h2>
  </div>
  <div>
    <div class="item"><span class="check">✓</span><div><strong>Descriptive IDs</strong> — 'dag_task_load_taxi_2024' not 'worker_1'</div></div>

    <div class="item"><span class="check">✓</span><div><strong>Registry cleanup</strong> — archive when &gt;50MB</div></div>

    <div class="item"><span class="check">✓</span><div><strong>Error handling</strong> — timeout != retry, don't interrupt active loads</div></div>
  </div>` },

  { bg:'slide-amber', render:`<div>

  </div>

results = benchmark.run_load_benchmark(preset='fast')

Throughput: 5,627,906 rows/sec
Duration: 7.25s
Rows: 40,800,000</div>
    <div style="margin-top:10px">
      <div style="font-size:11px;opacity:.7">Compare presets: dev (1.4M/s) vs prod (2.8M/s) vs fast (5.6M/s)</div>
      <div style="font-size:10px;opacity:.5;margin-top:4px;font-family:'IBM Plex Mono',monospace">Save JSON trends for capacity planning</div>
    </div>
  </div>` },

  { bg:'slide-mid', render:`<div>
    <div class="tag">Comparison</div>
    <h2>Registry vs alternatives</h2>
  </div>
  <div>
    <table class="mode-table" style="font-size:10px">
      <thead><tr><td style="opacity:.4">aspect</td><td style="opacity:.4">registry</td><td style="opacity:.4">postgres</td><td style="opacity:.4">temporal</td></tr></thead>
      <tr><td style="opacity:.7">setup</td><td style="color:#5DCAA5">1 JSON file</td><td>PG + network</td><td>SQL tables</td></tr>
      <tr><td style="opacity:.7">lock latency</td><td style="color:#5DCAA5">&lt;1ms</td><td>5-10ms</td><td>1-5ms</td></tr>
      <tr><td style="opacity:.7">max writers</td><td style="color:#5DCAA5">10-20</td><td>100+</td><td>5-10</td></tr>

      <tr><td style="opacity:.7">external deps</td><td style="color:#5DCAA5">zero</td><td>postgres</td><td>zero</td></tr>

];

const bgMap = {
  'slide-dark':'#0e1117','slide-teal':'#04342C','slide-amber':'#412402',
  'slide-blue':'#042C53','slide-mid':'#17191f'
};
const textMap = {
  'slide-dark':'#e8eaf0','slide-teal':'#9FE1CB','slide-amber':'#FAC775',
  'slide-blue':'#B5D4F4','slide-mid':'#e8eaf0'
};

let cur = 0, animating = false;
const stage = document.getElementById('stage');
const dotsEl = document.getElementById('dots');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const overlay = document.getElementById('pdf-overlay');
const overlayText = document.getElementById('overlay-text');
const overlaySub = document.getElementById('overlay-sub');
const renderArea = document.getElementById('pdf-render-area');

function build(){
  stage.innerHTML = '';
  dotsEl.innerHTML = '';
  slides.forEach((s,i)=>{
    const el = document.createElement('div');
    el.className = 'slide ' + s.bg + (i===0?' active':'');
    el.id = 'slide'+i;
    el.innerHTML = '<div class="progress-bar"><div class="progress-fill" style="width:'+((i+1)/slides.length*100).toFixed(1)+'%"></div></div>' + s.render;
    stage.appendChild(el);
    const d = document.createElement('button');
    d.className = 'dot'+(i===0?' on':'');
    d.onclick = ()=>goTo(i);
    d.setAttribute('aria-label','Go to slide '+(i+1));
    dotsEl.appendChild(d);
  });
}

function goTo(n){
  if(animating||n===cur) return;
  animating = true;
  const from = document.getElementById('slide'+cur);
  const to = document.getElementById('slide'+n);
  const dir = n > cur ? 1 : -1;
  to.style.transform = 'translateX('+(dir*60)+'px)';
  to.style.opacity = '0';
  to.style.pointerEvents = 'none';
  from.classList.remove('active');
  from.classList.add('exit');
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      to.classList.add('active');
      to.style.transform = '';
      to.style.opacity = '';
      to.style.pointerEvents = '';
    });
  });
  from.addEventListener('transitionend', ()=>{
    from.classList.remove('exit');
    animating = false;
  }, {once:true});
  document.querySelectorAll('.dot').forEach((d,i)=>d.className='dot'+(i===n?' on':''));
  cur = n;
  prevBtn.disabled = cur===0;
  nextBtn.disabled = cur===slides.length-1;
}

function move(d){ goTo(Math.max(0,Math.min(slides.length-1,cur+d))); }
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ') move(1);
  if(e.key==='ArrowLeft') move(-1);
});

function buildPDFPages(){
  renderArea.innerHTML = '';
  slides.forEach((s,i)=>{
    const page = document.createElement('div');
    page.className = 'pdf-slide-page';
    page.style.background = bgMap[s.bg]||'#0e1117';
    page.style.color = textMap[s.bg]||'#e8eaf0';
    page.innerHTML = '<div style="position:absolute;right:24px;top:18px;font-size:10px;opacity:.35;font-family:IBM Plex Mono,monospace">'+(i+1)+' / '+slides.length+'</div>' + s.render;
    renderArea.appendChild(page);
  });
}

async function exportPDF(){
  overlay.classList.add('visible');
  overlayText.textContent = 'Generating PDF…';
  overlaySub.textContent = 'Preparing '+slides.length+' slides';
  try{
    buildPDFPages();
    await new Promise(r=>setTimeout(r,600));
    const pages = renderArea.querySelectorAll('.pdf-slide-page');
    const elements = [];
    pages.forEach(p=>elements.push(p));
    const opt = {
      margin:[6,6,6,6],
      filename:'analytics-and-databases-deck.pdf',
      image:{type:'jpeg',quality:0.98},
      html2canvas:{scale:2,useCORS:true,backgroundColor:'#0a0c10',logging:false},
      jsPDF:{unit:'mm',format:'a4',orientation:'landscape'},
      pagebreak:{mode:['css','legacy'],before:'.pdf-slide-page'}
    };
    await html2pdf().set(opt).from(renderArea).save();
    overlayText.textContent = 'PDF downloaded!';
    overlaySub.textContent = 'analytics-and-databases-deck.pdf';
  } catch(err){
    overlayText.textContent = 'Export failed';
    overlaySub.textContent = err.message || 'Unknown error';
    console.error(err);
  }
  setTimeout(()=>overlay.classList.remove('visible'),1800);
}

build();
prevBtn.disabled = true;
</script>
</body>
