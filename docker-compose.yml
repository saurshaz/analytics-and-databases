version: '3.8'

services:
  postgres:
    image: pgduckdb/pgduckdb:17-v1.1.1
    container_name: nyc_taxi_pg
    environment:
      POSTGRES_DB: nyc_taxi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./analytical-db-knockout/schema_postgres.sql:/docker-entrypoint-initdb.d/01_schema.sql
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "work_mem=256MB"
      - "-c"
      - "maintenance_work_mem=1GB"
      - "-c"
      - "max_parallel_workers=8"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "effective_cache_size=6GB"
      - "-c"
      - "random_page_cost=1.1"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: nyc_taxi_clickhouse
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native TCP interface
      - "9009:9009"  # Interserver HTTP
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./analytical-db-knockout/schema_clickhouse.sql:/docker-entrypoint-initdb.d/init.sql
      - ./clickhouse_users.xml:/etc/clickhouse-server/users.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          memory: 18G
        reservations:
          memory: 9G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  clickhouse_data:
